<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Smart Job Portal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <span>SmartJob</span> Portal
            </a>
            <div class="nav-links">
                <a href="login.html">Sign In</a>
            </div>
        </div>
    </nav>

    <main class="auth-wrapper">
        <div class="glass-panel auth-card">
            <div class="auth-header">
                <h2>Set New Password</h2>
                <p>Choose a new password for your account</p>
            </div>
            
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required minlength="6">
                </div>
                
                <button type="submit" class="btn btn-primary mt-1" style="width: 100%;">Reset Password</button>
            </form>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                Toast.show('Passwords do not match', 'error');
                return;
            }

            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                Toast.show('No reset token provided in URL', 'error');
                return;
            }

            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'Resetting...';
            btn.disabled = true;

            try {
                const res = await Api.Auth.resetPassword(token, password);
                
                Toast.show('Password successfully reset! You can now log in.');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (err) {
                Toast.show(err.message || 'Failed to reset password', 'error');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
