<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Smart Job Portal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <span>SmartJob</span> Portal
            </a>
            <div class="nav-links">
                <a href="login.html">Sign In</a>
            </div>
        </div>
    </nav>

    <main class="auth-wrapper">
        <div class="glass-panel auth-card">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p>Enter your email to receive a reset link</p>
            </div>
            
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                </div>
                
                <button type="submit" class="btn btn-primary mt-1" style="width: 100%;">Send Reset Link</button>
                
                <p class="text-center mt-3" style="font-size: 0.9rem;">
                    Remember your password? <a href="login.html" style="color: var(--primary); text-decoration: none;">Login here</a>
                </p>
            </form>
            
            <!-- Result container for testing (since no email service is configured) -->
            <div id="testResultContainer" style="display: none; margin-top: 1rem; padding: 1rem; background: rgba(var(--primary-light-rgb), 0.1); border-radius: 8px; font-size: 0.85rem; word-break: break-all;">
                <p style="margin-bottom: 0.5rem; color: var(--text);"><strong>Demo only:</strong> Since no email service is set up, here is your reset link:</p>
                <a id="testResetLink" href="#" style="color: var(--primary); font-family: monospace;"></a>
            </div>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'Sending...';
            btn.disabled = true;

            const email = document.getElementById('email').value;

            try {
                const res = await Api.Auth.forgotPassword(email);
                
                Toast.show('Reset link sent!');
                
                // For demo purposes, we display it since no email server is available locally
                if (res.resetToken) {
                    const testLink = window.location.origin + '/client/pages/reset-password.html?token=' + res.resetToken;
                    const testResultContainer = document.getElementById('testResultContainer');
                    const testResultAnchor = document.getElementById('testResetLink');
                    
                    testResultAnchor.href = testLink;
                    testResultAnchor.innerText = testLink;
                    testResultContainer.style.display = 'block';
                }

                btn.innerText = originalText;
                btn.disabled = false;
            } catch (err) {
                Toast.show(err.message || 'Failed to send reset email', 'error');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
